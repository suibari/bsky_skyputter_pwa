<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<script>try{const t=localStorage.getItem('skyputter_theme')||'system';if(t==='dark'||(t==='system'&&matchMedia('(prefers-color-scheme: dark)').matches))document.documentElement.classList.add('dark')}catch{}</script>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#0085ff" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="SkyPutter" />
		<link rel="manifest" href="/manifest.json" />
		<link rel="icon" href="/skyputter_icon.png" type="image/png" />
		<link rel="apple-touch-icon" href="/skyputter_icon.png" />
		<meta property="og:title" content="SkyPutter" />
		<meta property="og:description" content="アウトプッターのためのBlueskyクライアント" />
		<meta property="og:image" content="https://skyputter.suibari.com/ogp.png" />
		<meta property="og:url" content="https://skyputter.suibari.com" />
		<meta property="og:type" content="website" />
		<meta name="twitter:card" content="summary_large_image" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
